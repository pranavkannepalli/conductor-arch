name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-supply-chain:
    name: Rust supply chain
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-security-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-security-cargo-

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  trivy-filesystem:
    name: Trivy filesystem scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Trivy vulnerability gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-filesystem.sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-filesystem-sarif
          path: trivy-filesystem.sarif
          if-no-files-found: error

  workflow-security:
    name: Workflow security
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.5.6
        with:
          persona: pedantic
          advanced-security: false
          annotations: true
