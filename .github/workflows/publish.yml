name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and package release
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev pkg-config \
            fuse libfuse2 git sqlite3

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Derive version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' <<< "$VERSION"; then
            echo "version must look like MAJOR.MINOR.PATCH, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create dist directory
        run: mkdir -p dist

      # Tarball
      - name: Package tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tar -czf "dist/linux-archductor-${VERSION}-linux-x86_64.tar.gz" \
            -C target/release linux-archductor linux-archductor-gtk

      # .deb and .rpm via nfpm
      - name: Install nfpm
        run: |
          set -euxo pipefail
          NFPM_VERSION="2.38.0"
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build .deb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm package --packager deb --target dist/

      - name: Build .rpm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm package --packager rpm --target dist/

      # AppImage
      - name: Install appimagetool
        run: |
          set -euxo pipefail
          curl -fsSL -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Assemble AppDir
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euxo pipefail
          APPDIR="packaging/appimage/linux-archductor.AppDir"
          install -Dm755 target/release/linux-archductor "$APPDIR/usr/bin/linux-archductor"
          install -Dm755 target/release/linux-archductor-gtk "$APPDIR/usr/bin/linux-archductor-gtk"
          # SVG icon is committed at $APPDIR/linux-archductor.svg

      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APPDIR="packaging/appimage/linux-archductor.AppDir"
          appimagetool --appimage-extract-and-run "$APPDIR" \
            "dist/linux-archductor-${VERSION}-x86_64.AppImage"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS

      - name: Scan release artifacts with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: dist
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Generate release scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref: dist
          format: sarif
          output: trivy-release-artifacts.sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Upload release scan SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-release-artifacts-sarif
          path: trivy-release-artifacts.sarif
          if-no-files-found: error

      # Upload
      - name: Upload all artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-archductor-${{ github.ref_name }}-packages
          path: dist/*

      - name: Attach artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/SHA256SUMS
