name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and package release
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev pkg-config \
            fuse libfuse2 git sqlite3

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Derive version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create dist directory
        run: mkdir -p dist

      # Tarball
      - name: Package tarball
        run: |
          tar -czf dist/linux-conductor-${{ github.ref_name }}-linux-x86_64.tar.gz \
            -C target/release linux-conductor linux-conductor-gtk

      # .deb and .rpm via nfpm
      - name: Install nfpm
        run: |
          set -euxo pipefail
          NFPM_VERSION="2.38.0"
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build .deb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm package --packager deb --target dist/

      - name: Build .rpm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm package --packager rpm --target dist/

      # AppImage
      - name: Install appimagetool
        run: |
          set -euxo pipefail
          curl -fsSL -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Assemble AppDir
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euxo pipefail
          APPDIR="packaging/appimage/linux-conductor.AppDir"
          install -Dm755 target/release/linux-conductor "$APPDIR/usr/bin/linux-conductor"
          install -Dm755 target/release/linux-conductor-gtk "$APPDIR/usr/bin/linux-conductor-gtk"
          # SVG icon is committed at $APPDIR/linux-conductor.svg

      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APPDIR="packaging/appimage/linux-conductor.AppDir"
          appimagetool --appimage-extract-and-run "$APPDIR" \
            "dist/linux-conductor-${VERSION}-x86_64.AppImage"

      # Upload
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-conductor-${{ github.ref_name }}-packages
          path: dist/*

      - name: Attach artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
