name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and package release
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev pkg-config \
            fuse libfuse2 git sqlite3

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Derive version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' <<< "$VERSION"; then
            echo "version must look like MAJOR.MINOR.PATCH, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create dist directory
        run: mkdir -p dist

      # Tarball
      - name: Package tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BUNDLE="dist/archductor-${VERSION}-linux-x86_64"
          install -Dm755 target/release/archductor "$BUNDLE/bin/archductor"
          install -Dm755 target/release/archductor-gtk "$BUNDLE/bin/archductor-gtk"
          install -Dm755 target/release/archcar "$BUNDLE/bin/archcar"
          install -Dm644 packaging/archductor-gtk.desktop \
            "$BUNDLE/share/applications/archductor-gtk.desktop"
          install -Dm644 packaging/assets/archductor.png \
            "$BUNDLE/share/icons/hicolor/256x256/apps/archductor.png"
          install -d "$BUNDLE/share/fonts/archductor"
          install -m644 packaging/assets/fonts/*.ttf packaging/assets/fonts/*.otf \
            packaging/assets/fonts/*.txt \
            "$BUNDLE/share/fonts/archductor/"
          tar -czf "dist/archductor-${VERSION}-linux-x86_64.tar.gz" \
            -C dist "archductor-${VERSION}-linux-x86_64"
          rm -rf "$BUNDLE"

      # .deb and .rpm via nfpm
      - name: Install nfpm
        run: |
          set -euxo pipefail
          NFPM_VERSION="2.38.0"
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build .deb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm package --packager deb --target dist/

      - name: Build .rpm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm package --packager rpm --target dist/

      # AppImage
      - name: Install appimagetool
        run: |
          set -euxo pipefail
          curl -fsSL -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Assemble AppDir
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euxo pipefail
          APPDIR="packaging/appimage/archductor.AppDir"
          install -Dm755 target/release/archductor "$APPDIR/usr/bin/archductor"
          install -Dm755 target/release/archductor-gtk "$APPDIR/usr/bin/archductor-gtk"
          # PNG icon and font pack are committed in the AppDir.

      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APPDIR="packaging/appimage/archductor.AppDir"
          appimagetool --appimage-extract-and-run "$APPDIR" \
            "dist/archductor-${VERSION}-x86_64.AppImage"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS

      - name: Scan release artifacts with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: dist
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Generate release scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref: dist
          format: sarif
          output: trivy-release-artifacts.sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Upload release scan SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-release-artifacts-sarif
          path: trivy-release-artifacts.sarif
          if-no-files-found: error

      # Upload
      - name: Upload all artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archductor-${{ github.ref_name }}-packages
          path: dist/*

      - name: Attach artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/SHA256SUMS

  build-windows-release:
    name: Build Windows release
    runs-on: windows-2025
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
      CC_x86_64_pc_windows_gnu: gcc
      AR_x86_64_pc_windows_gnu: ar
      PKG_CONFIG_ALLOW_CROSS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Windows GTK toolchain
        id: msys2
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita

      - name: Configure Windows GTK environment
        shell: pwsh
        run: |
          $ucrt = "${{ steps.msys2.outputs.msys2-location }}\ucrt64"
          $pkgconf = "$ucrt\bin\pkgconf.exe"
          $pkgConfigPath = "$ucrt\lib\pkgconfig"
          Add-Content -Path $env:GITHUB_PATH -Value "$ucrt\bin"
          @(
            "UCRT64_ROOT=$ucrt",
            "PKG_CONFIG=$pkgconf",
            "PKG_CONFIG_x86_64_pc_windows_gnu=$pkgconf",
            "PKG_CONFIG_PATH=$pkgConfigPath",
            "PKG_CONFIG_PATH_x86_64_pc_windows_gnu=$pkgConfigPath"
          ) | Add-Content -Path $env:GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Verify Windows GTK pkg-config
        shell: pwsh
        run: |
          pkgconf --version
          pkgconf --libs --cflags glib-2.0
          gcc --version

      - name: Derive version
        id: version
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $version = $env:VERSION_INPUT
          } else {
            $version = $env:REF_NAME -replace '^v', ''
          }
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$') {
            throw "version must look like MAJOR.MINOR.PATCH, got: $version"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Windows binaries
        run: cargo build --workspace --release --target x86_64-pc-windows-gnu --locked

      - name: Assemble portable Windows bundle
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $bundle = "dist\archductor-$env:VERSION-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item target\x86_64-pc-windows-gnu\release\archductor.exe $bundle
          Copy-Item target\x86_64-pc-windows-gnu\release\archductor-gtk.exe $bundle
          Copy-Item target\x86_64-pc-windows-gnu\release\archcar.exe $bundle
          Copy-Item packaging\assets\archductor.png $bundle
          Copy-Item packaging\assets\fonts "$bundle\fonts" -Recurse
          Copy-Item "$env:UCRT64_ROOT\bin\*.dll" $bundle
          New-Item -ItemType Directory -Force -Path "$bundle\lib" | Out-Null
          Copy-Item "$env:UCRT64_ROOT\lib\gdk-pixbuf-2.0" "$bundle\lib" -Recurse
          if (Test-Path "$env:UCRT64_ROOT\lib\gtk-4.0") {
            Copy-Item "$env:UCRT64_ROOT\lib\gtk-4.0" "$bundle\lib" -Recurse
          }
          New-Item -ItemType Directory -Force -Path "$bundle\share" | Out-Null
          Copy-Item "$env:UCRT64_ROOT\share\glib-2.0" "$bundle\share" -Recurse
          Copy-Item "$env:UCRT64_ROOT\share\icons" "$bundle\share" -Recurse
          Copy-Item "$env:UCRT64_ROOT\share\mime" "$bundle\share" -Recurse
          $originalPath = $env:PATH
          $env:PATH = (($env:PATH -split ';') | Where-Object {
            $_ -and ($_ -notlike "$env:UCRT64_ROOT\bin*")
          }) -join ';'
          try {
            Push-Location $bundle
            .\archductor.exe doctor
          } finally {
            Pop-Location
            $env:PATH = $originalPath
          }
          Compress-Archive -Path "$bundle\*" -DestinationPath "$bundle.zip"
          $archive = Get-Item "$bundle.zip"
          $hash = (Get-FileHash -Algorithm SHA256 $archive.FullName).Hash.ToLowerInvariant()
          "$hash  $($archive.Name)" | Set-Content dist\SHA256SUMS-windows.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archductor-${{ github.ref_name }}-windows
          path: |
            dist/*.zip
            dist/SHA256SUMS-windows.txt
          if-no-files-found: error

      - name: Attach Windows artifact to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS-windows.txt

  publish-aur:
    name: Publish AUR package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - build-release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Derive version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' <<< "$VERSION"; then
            echo "version must look like MAJOR.MINOR.PATCH, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare AUR files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euxo pipefail
          source_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/tags/v${VERSION}.tar.gz"
          checksum="$(curl -fsSL "$source_url" | sha256sum | awk '{print $1}')"
          scripts/update-aur-checksum.sh "$VERSION" "$checksum"

          rm -rf aur-package
          mkdir -p aur-package
          cp packaging/aur/PKGBUILD aur-package/PKGBUILD
          docker run --rm \
            -v "$PWD/aur-package:/pkg" \
            archlinux:base-devel \
            bash -lc 'useradd -m builder && chown -R builder:builder /pkg && su builder -c "cd /pkg && makepkg --printsrcinfo > .SRCINFO"'

      - name: Validate AUR package
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "$PWD/aur-package:/pkg" \
            archlinux:base-devel \
            bash -lc '
              set -euxo pipefail
              pacman -Syu --noconfirm \
                cargo dbus git github-cli gtk4 libadwaita openssh pkgconf rust sqlite xorg-server-xvfb
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -c "cd /pkg && makepkg --noconfirm"
              pacman -U --noconfirm /pkg/archductor-*.pkg.tar.*
              archductor doctor
              gtk_status=0
              xvfb-run -a timeout 15s archductor-gtk --page dashboard || gtk_status=$?
              if [ "$gtk_status" -ne 0 ] && [ "$gtk_status" -ne 124 ]; then
                exit "$gtk_status"
              fi
            '
          sudo chown -R "$(id -u):$(id -g)" aur-package
          chmod -R u+rwX,go+rX aur-package

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euxo pipefail
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "AUR_SSH_PRIVATE_KEY secret is required to publish to AUR." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

          git config --global user.name "Archductor Release Bot"
          git config --global user.email "pranav.kannepalli@gmail.com"

          if git clone ssh://aur@aur.archlinux.org/archductor.git aur-repo; then
            :
          else
            mkdir aur-repo
            git -C aur-repo init
            git -C aur-repo remote add origin ssh://aur@aur.archlinux.org/archductor.git
          fi

          cp aur-package/PKGBUILD aur-package/.SRCINFO aur-repo/
          cd aur-repo
          git checkout -B master
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package is already up to date for ${VERSION}."
            exit 0
          fi
          git commit -m "Update to ${VERSION}"
          git push origin master

  publish-homebrew-tap:
    name: Publish Homebrew tap
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - build-release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Derive version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' <<< "$VERSION"; then
            echo "version must look like MAJOR.MINOR.PATCH, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare Homebrew formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          source_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/tags/v${VERSION}.tar.gz"
          checksum="$(curl -fsSL "$source_url" | sha256sum | awk '{print $1}')"
          scripts/update-homebrew-formula.sh "$VERSION" "$checksum"

      - name: Install Homebrew
        run: |
          set -euo pipefail
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends build-essential curl file git procps xz-utils xvfb
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Validate Homebrew formula
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          set -euxo pipefail
          brew --version
          git config --global user.name "Archductor Release Bot"
          git config --global user.email "pranav.kannepalli@gmail.com"
          brew tap-new perceo-ai/tap
          tap_formula="$(brew --repository perceo-ai/tap)/Formula/archductor.rb"
          cp packaging/homebrew/Formula/archductor.rb "$tap_formula"
          brew audit --strict --online --formula perceo-ai/tap/archductor
          brew install --build-from-source perceo-ai/tap/archductor
          brew test perceo-ai/tap/archductor
          archductor doctor
          gtk_status=0
          xvfb-run -a timeout 15s archductor-gtk --page dashboard || gtk_status=$?
          if [ "$gtk_status" -ne 0 ] && [ "$gtk_status" -ne 124 ]; then
            exit "$gtk_status"
          fi

      - name: Publish formula to tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is required to publish the tap." >&2
            exit 1
          fi

          git config --global user.name "Archductor Release Bot"
          git config --global user.email "pranav.kannepalli@gmail.com"
          git config --global url."https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/".insteadOf "https://github.com/"

          git clone https://github.com/perceo-ai/homebrew-tap.git homebrew-tap
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/Formula/archductor.rb homebrew-tap/Formula/archductor.rb

          cd homebrew-tap
          git add Formula/archductor.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap is already up to date for ${VERSION}."
            exit 0
          fi
          git commit -m "archductor ${VERSION}"
          git push origin HEAD:main
