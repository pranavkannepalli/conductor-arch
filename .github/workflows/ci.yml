name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev pkg-config \
            git sqlite3 openssh-client xvfb

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test workspace
        run: xvfb-run -a cargo test --workspace --locked -- --test-threads=1

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Package debug binaries
        run: |
          mkdir -p ci-artifacts/bin
          cp target/debug/archductor ci-artifacts/bin/
          cp target/debug/archductor-gtk ci-artifacts/bin/
          cp target/debug/archcar ci-artifacts/bin/

      - name: Upload debug binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-debug-binaries
          path: ci-artifacts/bin/
          if-no-files-found: error
          retention-days: 7

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-security-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-security-cargo-

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check

      - name: Run Trivy vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-filesystem.sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          timeout: 10m

      - name: Upload Trivy SARIF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-filesystem-sarif
          path: trivy-filesystem.sarif
          if-no-files-found: error
          retention-days: 14

  workflow-audit:
    name: Workflow Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: pedantic
          min-severity: high
          advanced-security: false
          annotations: true

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: rust
          queries: security-extended,security-and-quality
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:rust
          output: codeql-results
          upload: never

      - name: Fail on high-severity CodeQL results
        run: |
          jq -e '
            [ .runs[]?.results[]?
              | select((.properties."security-severity"? // "0" | tonumber) >= 7)
            ] as $alerts
            | if ($alerts | length) == 0 then
                true
              else
                $alerts[]
                | "\(.ruleId): \(.message.text)"
                | halt_error(1)
              end
          ' codeql-results/rust.sarif

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: codeql-rust-sarif
          path: codeql-results/rust.sarif
          if-no-files-found: error
          retention-days: 14

  windows-port:
    name: Windows native build
    runs-on: windows-2025
    timeout-minutes: 40
    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: C:\msys64\ucrt64\bin\gcc.exe
      CC_x86_64_pc_windows_gnu: C:\msys64\ucrt64\bin\gcc.exe
      AR_x86_64_pc_windows_gnu: C:\msys64\ucrt64\bin\ar.exe
      PKG_CONFIG: C:\msys64\ucrt64\bin\pkg-config.exe
      PKG_CONFIG_ALLOW_CROSS: "1"
      PKG_CONFIG_PATH: C:\msys64\ucrt64\lib\pkgconfig
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Windows GTK toolchain
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita

      - name: Add UCRT64 runtime to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value 'C:\msys64\ucrt64\bin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Check Windows workspace
        run: cargo check --workspace --all-targets --target x86_64-pc-windows-gnu --locked

      - name: Build Windows workspace
        run: cargo build --workspace --target x86_64-pc-windows-gnu --locked

      - name: Smoke Windows local transport
        run: cargo test -p archductor-core --target x86_64-pc-windows-gnu --locked archcar::transport::tests::local_transport_round_trips

      - name: Smoke Windows platform helpers
        run: cargo test -p archductor-core --target x86_64-pc-windows-gnu --locked platform::tests

      - name: Smoke Windows CLI adapters
        run: cargo test -p archductor --target x86_64-pc-windows-gnu --locked windows_

      - name: Smoke Windows CLI
        run: cargo run -p archductor --target x86_64-pc-windows-gnu --locked -- doctor

  linux-musl:
    name: Linux musl build
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install musl toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build portable musl binaries
        run: cargo build -p archductor-core -p archductor -p archcar --target x86_64-unknown-linux-musl --locked

  linux-distros:
    name: Linux GTK (${{ matrix.family }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - family: debian
            image: debian:trixie
          - family: fedora
            image: fedora:latest
          - family: arch
            image: archlinux:latest
          - family: opensuse
            image: opensuse/tumbleweed:latest
          - family: alpine
            image: alpine:3.23
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install Debian dependencies
        if: matrix.family == 'debian'
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends ca-certificates curl git gcc libgtk-4-dev libadwaita-1-dev pkg-config

      - name: Install Fedora dependencies
        if: matrix.family == 'fedora'
        run: dnf install -y ca-certificates curl git gcc gtk4-devel libadwaita-devel pkgconf-pkg-config

      - name: Install Arch dependencies
        if: matrix.family == 'arch'
        run: pacman -Syu --noconfirm --needed ca-certificates curl git gcc gtk4 libadwaita pkgconf

      - name: Install openSUSE dependencies
        if: matrix.family == 'opensuse'
        run: zypper --non-interactive install ca-certificates curl git gcc gtk4-devel libadwaita-devel pkg-config

      - name: Install Alpine dependencies
        if: matrix.family == 'alpine'
        run: apk add --no-cache bash ca-certificates cargo curl gcompat git gcc musl-dev rust gtk4.0-dev libadwaita-dev pkgconf

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        if: matrix.family != 'alpine'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Check workspace
        run: cargo check --workspace --all-targets --locked

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs:
      - dependency-scan
      - workflow-audit
      - codeql
      - windows-port
      - linux-musl
      - linux-distros
    steps:
      - name: Confirm all gates passed
        run: echo "All CI gates passed."
