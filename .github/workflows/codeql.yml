name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "41 8 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: rust
          queries: security-extended,security-and-quality
          build-mode: none

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:rust
          output: codeql-results
          upload: never

      - name: Fail on high-severity CodeQL results
        run: |
          jq -e '
            [ .runs[]?.results[]?
              | select((.properties."security-severity"? // "0" | tonumber) >= 7)
            ] as $alerts
            | if ($alerts | length) == 0 then
                true
              else
                $alerts[]
                | "\(.ruleId): \(.message.text)"
                | halt_error(1)
              end
          ' codeql-results/rust.sarif

      - name: Upload CodeQL SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: codeql-rust-sarif
          path: codeql-results/rust.sarif
          if-no-files-found: error
