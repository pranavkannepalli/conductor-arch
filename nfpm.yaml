name: archductor
arch: amd64
platform: linux
version: ${VERSION}
release: 1
section: utils
priority: optional
maintainer: Pranav Kannepalli <pranav.kannepalli@gmail.com>
description: |
  Archductor is a parallel coding-agent workflow tool built around Git worktrees.
  Each task gets its own isolated workspace: a branch, a directory, a terminal,
  agent sessions, run scripts, diffs, checks, and a pull request path.
vendor: archductor
homepage: https://github.com/pranavkannepalli/conductor-arch
license: Apache-2.0

contents:
  - src: target/release/archductor
    dst: /usr/bin/archductor
    file_info:
      mode: 0755

  - src: target/release/archductor-gtk
    dst: /usr/bin/archductor-gtk
    file_info:
      mode: 0755

  - src: packaging/archductor-gtk.desktop
    dst: /usr/share/applications/archductor-gtk.desktop
    file_info:
      mode: 0644

  - src: packaging/assets/archductor.png
    dst: /usr/share/icons/hicolor/256x256/apps/archductor.png
    file_info:
      mode: 0644

  - src: packaging/assets/fonts/*
    dst: /usr/share/fonts/archductor/
    file_info:
      mode: 0644

  - src: README.md
    dst: /usr/share/doc/archductor/README.md
    file_info:
      mode: 0644

overrides:
  deb:
    depends:
      - git
      - gh
      - sqlite3
      - openssh-client
      - libgtk-4-1
      - libadwaita-1-0
  rpm:
    depends:
      - git
      - gh
      - sqlite
      - openssh-clients
      - gtk4
      - libadwaita
