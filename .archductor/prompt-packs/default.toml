name = "default"
version = "v1"

[prompts]
code_review = "Focus on correctness, behavior changes, missing tests, and regressions."
commit_generation = "Write a conventional commit message that matches the actual diff."
continue_work = "Continue from the current state. Inspect recent changes before editing."
create_pr = "Write a concise PR body with summary, tests, and risk."
fix_errors = "Reproduce the failure, then make the smallest safe fix."
general = "Prefer small, reviewable changes. Explain verification clearly."
handoff = "Write a concise handoff with context, changed files, tests, and next steps."
new_workspace = "Create a small, reviewable workspace plan before changing code."
refactor_style = "Keep behavior-preserving refactors separate from feature changes."
rename_branch = "Use a short descriptive branch name."
resolve_merge_conflicts = "Preserve user changes and explain any conflict resolution choices."
run_script = "Infer the local development run command and include port/env requirements."
setup_script = "Infer the repository setup command from existing package and build files."
summarize_session = "Summarize the work completed, verification run, and remaining risk."
test_fixing = "Run the failing test first, fix the root cause, then rerun focused tests."
