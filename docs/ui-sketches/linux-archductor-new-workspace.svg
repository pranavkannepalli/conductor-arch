<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Linux Archductor new workspace UI sketch</title>
  <desc id="desc">Dark wireframe showing a new workspace form with repository, issue, branch, agent, files to copy, and setup preview.</desc>
  <defs>
    <style>
      .bg { fill: #141414; }
      .scrim { fill: #0f0f0f; opacity: .64; }
      .panel { fill: #1b1b1b; stroke: #303030; stroke-width: 1; }
      .panel2 { fill: #202020; stroke: #353535; stroke-width: 1; }
      .field { fill: #171717; stroke: #3d3d3d; stroke-width: 1; }
      .muted { fill: #8c8c8c; font: 13px Inter, Arial, sans-serif; }
      .text { fill: #e8e8e8; font: 14px Inter, Arial, sans-serif; }
      .small { fill: #b8b8b8; font: 12px Inter, Arial, sans-serif; }
      .title { fill: #f2f2f2; font: 600 18px Inter, Arial, sans-serif; }
      .heading { fill: #f2f2f2; font: 600 14px Inter, Arial, sans-serif; }
      .mono { fill: #d8d8d8; font: 13px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
      .accent { fill: #7dd3fc; }
      .green { fill: #73d98f; }
      .yellow { fill: #e5c07b; }
      .line { stroke: #303030; stroke-width: 1; }
      .button { fill: #2c2c2c; stroke: #474747; stroke-width: 1; }
      .primaryButton { fill: #e8e8e8; }
      .primaryText { fill: #151515; font: 600 13px Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>
  <rect class="panel" x="20" y="20" width="300" height="860" rx="8"/>
  <rect class="panel" x="332" y="20" width="1088" height="860" rx="8"/>
  <text class="muted" x="48" y="76">archductor-linux</text>
  <rect class="panel2" x="42" y="128" width="254" height="58" rx="6"/>
  <text class="text" x="64" y="162">tel-aviv</text>
  <rect class="panel2" x="42" y="198" width="254" height="58" rx="6"/>
  <text class="text" x="64" y="232">berlin</text>
  <text class="title" x="372" y="64">Workspaces</text>
  <text class="muted" x="372" y="96">Create one workspace per shippable task.</text>
  <rect class="scrim" x="0" y="0" width="1440" height="900"/>

  <rect class="panel" x="400" y="86" width="640" height="728" rx="8"/>
  <text class="title" x="440" y="136">New workspace</text>
  <text class="muted" x="440" y="162">Create an isolated Git worktree with branch, files, setup, and agent context.</text>

  <line class="line" x1="400" y1="190" x2="1040" y2="190"/>

  <text class="heading" x="440" y="228">Repository</text>
  <rect class="field" x="440" y="244" width="560" height="42" rx="6"/>
  <text class="text" x="458" y="270">archductor · ~/src/archductor</text>

  <text class="heading" x="440" y="322">Start from</text>
  <rect class="field" x="440" y="338" width="270" height="42" rx="6"/>
  <text class="text" x="458" y="364">origin/main</text>
  <rect class="field" x="730" y="338" width="270" height="42" rx="6"/>
  <text class="text" x="748" y="364">GitHub issue or task</text>

  <text class="heading" x="440" y="416">Workspace</text>
  <rect class="field" x="440" y="432" width="270" height="42" rx="6"/>
  <text class="text" x="458" y="458">helsinki</text>
  <rect class="field" x="730" y="432" width="270" height="42" rx="6"/>
  <text class="text" x="748" y="458">lc/helsinki-fix-ci</text>

  <text class="heading" x="440" y="510">Agent</text>
  <rect class="field" x="440" y="526" width="172" height="42" rx="6"/>
  <text class="text" x="458" y="552">Codex</text>
  <rect class="field" x="628" y="526" width="172" height="42" rx="6"/>
  <text class="text" x="646" y="552">Claude Code</text>
  <rect class="field" x="816" y="526" width="184" height="42" rx="6"/>
  <text class="text" x="834" y="552">Shell only</text>

  <text class="heading" x="440" y="604">Setup preview</text>
  <rect class="panel2" x="440" y="620" width="560" height="92" rx="8"/>
  <text class="mono" x="462" y="650">git fetch --prune origin</text>
  <text class="mono" x="462" y="676">git worktree add ... -b lc/helsinki-fix-ci origin/main</text>
  <text class="green" x="462" y="702">copy .env.local · run pnpm install · port 42050</text>

  <rect class="button" x="764" y="748" width="96" height="36" rx="6"/>
  <text class="text" x="796" y="771">Cancel</text>
  <rect class="primaryButton" x="874" y="748" width="126" height="36" rx="6"/>
  <text class="primaryText" x="900" y="771">Create</text>
</svg>
