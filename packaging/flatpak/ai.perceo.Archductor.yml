app-id: ai.perceo.Archductor
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: archductor-gtk

finish-args:
  # Full filesystem access is required for arbitrary repository and workspace paths.
  - --filesystem=host
  # Network access is required for git fetch, gh CLI, and agent sessions.
  - --share=network
  # IPC and display sockets are required for GTK desktop integration.
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --env=SHELL=/bin/bash

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/archductor/cargo
    RUST_BACKTRACE: '1'

modules:
  - name: archductor
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release --locked --workspace
      - install -Dm755 target/release/archductor /app/bin/archductor
      - install -Dm755 target/release/archductor-gtk /app/bin/archductor-gtk
      - install -Dm644 README.md /app/share/doc/archductor/README.md
      - install -Dm644 packaging/flatpak/ai.perceo.Archductor.metainfo.xml
          /app/share/metainfo/ai.perceo.Archductor.metainfo.xml
      - install -Dm644 packaging/flatpak/ai.perceo.Archductor.desktop
          /app/share/applications/ai.perceo.Archductor.desktop
      - install -Dm644 packaging/assets/archductor.png
          /app/share/icons/hicolor/256x256/apps/ai.perceo.Archductor.png
      - install -d /app/share/fonts/archductor
      - cp packaging/assets/fonts/*.ttf packaging/assets/fonts/*.otf
          packaging/assets/fonts/*.txt
          /app/share/fonts/archductor/
    sources:
      - type: dir
        path: ../..
      - cargo-sources.json
    build-options:
      env:
        CARGO_NET_OFFLINE: 'true'
        LIBSQLITE3_SYS_USE_PKG_CONFIG: '1'
